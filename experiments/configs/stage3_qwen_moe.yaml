# Stage 3d: Qwen-MoE Architecture Test
# Purpose: Prove "AG-SAR is robust to dynamic compute paths (MoE Routing)"
#
# WHY THIS MODEL:
#   - Qwen1.5-MoE-A2.7B has 14.3B total params but only 2.7B active per token
#   - Fits easily on 1× H100 (~6GB VRAM)
#   - Captures MoE dynamics (sparse expert routing) without Mixtral's 95GB requirement
#   - Provides the "MoE robustness" data point for paper defense

experiment:
  name: "stage3_qwen_moe"
  description: "Test AG-SAR on Qwen1.5-MoE (sparse architecture, fits 1×H100)"

dataset:
  name: halueval_qa
  num_samples: 500
  seed: 42

model:
  name: "Qwen/Qwen1.5-MoE-A2.7B-Chat"
  dtype: "bfloat16"
  attn_implementation: "sdpa"
  device_map: "cuda:0"  # Single GPU - fits easily
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
  logprob: true   # Required for Δ comparison
  entropy: true   # Required for Δ comparison

evaluation:
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/stage3_qwen_moe"
  save_predictions: true
  save_scores: true

# Paper Claim Enabled:
#   "AG-SAR maintains consistent performance on MoE architectures,
#    demonstrating robustness to dynamic expert routing."
