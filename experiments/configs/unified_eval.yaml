# Unified Multi-Dataset Evaluation
# Runs ALL 4 datasets with ALL 10 metrics
#
# Datasets: HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA
# Metrics: AUROC, AUPRC, F1, TPR @ 5% FPR, ECE, Brier, AURC, Risk@90, Spearman
# (Latency tracked separately per method)

experiment:
  name: "unified_eval"
  description: "Comprehensive evaluation on HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA"

dataset:
  name: "ALL"  # Special marker to load all 4 datasets
  num_samples: 1000  # Per dataset (4000 total samples)
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention weight extraction
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR v8.0 Gold Master
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    # Semantic Dispersion
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  logprob: true
  entropy: true
  # LLM-Check methods (NeurIPS 2024) - zero-shot, single-pass
  llmcheck_attn: true
  llmcheck_hidden: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Discrimination (higher=better)
    - auroc
    - auprc
    # Classification (higher=better)
    - f1
    # Operating point (higher=better)
    - tpr_at_5fpr
    # Calibration (lower=better)
    - ece
    - brier
    # Coverage & Utility (lower=better)
    - aurc
    - risk_90
    # Correlation (higher=better)
    - spearman
    # Note: Latency is tracked separately by the engine
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/unified_eval"
  save_predictions: true
  save_scores: true
