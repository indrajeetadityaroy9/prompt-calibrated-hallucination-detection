# Main SOTA Benchmark (Table 1)
# Paper Section 4.1: Synthetic Hallucination Detection
#
# Primary benchmark comparing AG-SAR against all SOTA baselines
# on HaluEval QA with balanced hallucinated/factual pairs.
#
# Includes all baselines: LogProb, Entropy, SelfCheck, EigenScore

experiment:
  name: "01_main_sota"
  description: "Main SOTA benchmark with AG-SAR and all baselines"

dataset:
  name: "halueval_qa"
  num_samples: 2500  # Results in ~5000 samples after pairing
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "sdpa"
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR (default v8.0 configuration)
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Register Filter
    enable_register_filter: true
    kurtosis_threshold: 2.0
    ema_decay: 0.995
    sink_token_count: 4
    # Authority Flow
    enable_authority_flow: true
    enable_spectral_roughness: true
    lambda_roughness: 10.0
    # Unified Gating (enabled by default)
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    # Semantic Dispersion (enabled by default)
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  logprob: true
  entropy: true
  selfcheck:
    num_samples: 5
    max_new_tokens: 256
    temperature: 0.7
  eigenscore: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Discrimination (higher=better)
    - auroc
    - auprc
    - auprc_factual
    # Classification (higher=better)
    - f1
    - precision
    - recall
    - accuracy
    # Calibration (lower=better)
    - ece
    - brier
    # Coverage & Utility (lower=better)
    - aurc
    - risk_80
    - risk_90
    - risk_95
    # Correlation (higher=better)
    - spearman
    - pearson
    - pointbiserial
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/01_main_sota"
  save_predictions: true
  save_scores: true
