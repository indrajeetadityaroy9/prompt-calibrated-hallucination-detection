# Stage 1: Metric Validation (GPT-2 Baseline)
# Purpose: Verify metric computation is correct before using larger models
# Run on CUDA (not CPU) to verify torch.compile Inductor backend

experiment:
  name: "stage1_metric_validation"
  description: "Validate metrics on GPT-2 with known-good dataset"

dataset:
  name: halueval_qa
  num_samples: 100  # Minimal for fast validation
  seed: 42

model:
  name: "gpt2"
  dtype: "float32"  # GPT-2 on float32 for numerical stability
  attn_implementation: "eager"  # GPT-2 doesn't support SDPA well
  device_map: "auto"

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
  logprob: true
  entropy: true

evaluation:
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 100  # Fewer for fast validation
  confidence_level: 0.95

output:
  output_dir: "results/stage1_metric_validation"
  save_predictions: true
  save_scores: true
