# Burn-in Smoke Test Configuration
# Purpose: Validate full pipeline before 20-hour run
# Duration: ~5 minutes
# Checks: JSONL writing, Resume logic, NaN handling

experiment:
  name: "burnin_smoke_test"
  description: "5-minute validation of full pipeline"

dataset:
  name: halueval_qa
  num_samples: 10
  seed: 42

model:
  name: "gpt2"
  dtype: "float32"
  device_map: "auto"
  attn_implementation: "eager"

methods:
  agsar:
    semantic_layers: 2
    power_iteration_steps: 2
  logprob: true
  entropy: true

evaluation:
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 100
  confidence_level: 0.95

output:
  output_dir: "results/burnin"
  save_predictions: true
  save_scores: true
