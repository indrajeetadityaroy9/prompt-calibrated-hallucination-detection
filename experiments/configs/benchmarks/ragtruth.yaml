# Head-to-Head Benchmark: Top-1 Projection vs JEPA Centroid Variance
# Dataset: RAGTruth (Real RAG Failures)
#
# This is the "Final Boss" benchmark:
# - Real LLM outputs from GPT-4, GPT-3.5, Llama-2, etc.
# - Real RAG contexts, not synthetic perturbations
# - Contains abstractive paraphrasing (JEPA's strength) and factual errors (Authority Flow's domain)
#
# Hypothesis:
# - AUROC improvement will be smaller than HaluEval (real data is harder)
# - AUPRC improvement will be MASSIVE (JEPA handles valid paraphrases)
#
# Usage: python scripts/launch_ragtruth_h2h.py

experiment:
  name: "H2H_RAGTruth"
  description: "Head-to-head comparison on RAGTruth real RAG failures"

output:
  output_dir: "results/ragtruth_h2h"
  save_predictions: true
  save_scores: true

# Model configuration
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "eager"  # Required for AG-SAR hooks
  trust_remote_code: true
  batch_size: 1

# Dataset configuration
dataset:
  name: "ragtruth"
  # Path to prepared JSONL file (run prepare_ragtruth.py first)
  data_file: "data/ragtruth_clean.jsonl"
  # Filter by task type (optional): qa, summary, data2text, all
  task_type: "all"
  # Maximum samples (null = all)
  num_samples: null
  seed: 42

# Evaluation configuration
evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - aurc
    - ece
    - brier
  bootstrap_samples: 1000
  confidence_level: 0.95

# Method configurations for parallel execution
parallel_methods:
  # GPU 0: Baseline (Legacy Token Matching)
  - name: "Baseline_v8_Top1"
    gpu_id: 0
    agsar:
      semantic_layers: 4
      power_iteration_steps: 3
      residual_weight: 0.5
      enable_unified_gating: true
      stability_sensitivity: 1.0
      enable_semantic_dispersion: true
      dispersion_k: 10
      dispersion_sensitivity: 0.8
      dispersion_method: "top1_projection"
      aggregation_method: "percentile_25"
      parametric_weight: 0.6
      enable_task_adaptive: false
      calibration_temperature: 2.5

  # GPU 1: JEPA (Centroid Variance)
  - name: "JEPA_Centroid"
    gpu_id: 1
    agsar:
      semantic_layers: 4
      power_iteration_steps: 3
      residual_weight: 0.5
      enable_unified_gating: true
      stability_sensitivity: 1.0
      enable_semantic_dispersion: true
      dispersion_k: 10
      dispersion_sensitivity: 0.8
      dispersion_method: "centroid_variance"
      aggregation_method: "percentile_25"
      parametric_weight: 0.6
      enable_task_adaptive: false
      calibration_temperature: 2.5
