# AG-SAR v9.0 Task-Adaptive Evaluation
# Automatically selects hyperparameters based on task type:
#   - QA: percentile_10 aggregation, T=1.2, dispersion_k=5
#   - RAG: mean aggregation, T=1.5, dispersion_k=7, lower parametric_weight
#   - Summarization: percentile_25, T=2.5, dispersion_k=10 (long-form)
#   - Attribution: percentile_25, T=2.0, dispersion_k=8

experiment:
  name: "agsar_task_adaptive"
  description: "AG-SAR v9.0 with per-task calibration"

dataset:
  name: "ALL"  # Load all 4 datasets: HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA
  num_samples: 1000  # Per dataset (4000 total)
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention weight extraction
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Base v8.0 parameters (will be overridden per-task when adaptive is on)
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5  # Overridden per-task
    # Semantic Dispersion
    enable_semantic_dispersion: true
    dispersion_k: 5  # Overridden per-task
    dispersion_sensitivity: 1.0  # Overridden per-task
    # Base aggregation/calibration (overridden per-task)
    aggregation_method: "mean"
    calibration_temperature: 1.0
    # v9.0 Task-Adaptive: ENABLED
    enable_task_adaptive: true
    task_type_override: null  # Auto-detect from dataset name
  # Baselines disabled for focused AG-SAR testing
  logprob: false
  entropy: false
  llmcheck_attn: false
  llmcheck_hidden: false

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Full 10-metric suite
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
    - risk_90
    - spearman
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/agsar_task_adaptive"
  save_predictions: true
  save_scores: true
