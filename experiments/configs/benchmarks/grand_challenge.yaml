# ==============================================================================
# AG-SAR: Grand Challenge Benchmark (ICML 2025)
# ==============================================================================
# This configuration runs the full suite of SOTA methods against AG-SAR v8.0.
# Warning: This is computationally expensive due to sampling-based methods.
# Estimated Runtime: ~4-6 hours on H100 depending on dataset size.
#
# Primary Model: Llama-3.1-8B-Instruct (standard academic benchmark class)
# Secondary Model: Llama-3.1-70B-Instruct (scaling validation, use device_map: auto)
# ==============================================================================

experiment:
  name: "grand_challenge_sota"
  description: "Full SOTA comparison for ICML 2025 Table 1"

dataset:
  name: "ragtruth"
  num_samples: 1000  # Cap for reasonable runtime (remove for full run)
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention weight extraction
  dtype: "bfloat16"             # H100 native precision (no quantization noise)
  device_map: "cuda:0"          # 8B fits on single GPU. Use "auto" for 70B.
  trust_remote_code: true
  batch_size: 1                 # Keep 1 for sampling methods to avoid OOM

methods:
  # 1. OUR METHOD (The Hero) - Single-pass, semantic dispersion
  agsar:
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "centroid_variance"  # Better for RAG/Summarization

  # 2. BASELINE: Predictive Entropy (standard straw man)
  entropy: true

  # 3. BASELINE: Log Probability
  logprob: true

  # 4. SOTA: SelfCheckGPT-NLI (accuracy gold standard, high latency)
  selfcheck:
    num_samples: 5
    max_new_tokens: 256
    temperature: 0.7
    generation_batch_size: 5

  # 5. SOTA: Semantic Entropy (Kuhn et al. 2023, clustering-based)
  semantic_entropy:
    num_samples: 5
    similarity_threshold: 0.8
    embedding_model: "all-MiniLM-L6-v2"
    max_new_tokens: 256
    temperature: 0.7

  # 6. SOTA: EigenScore (Chen et al. ICLR 2024, spectral analysis)
  eigenscore:
    num_samples: 5
    max_new_tokens: 50
    temperature: 1.0

  # 7. BASELINE: SAPLMA (hidden state probing)
  saplma: true

  # 8. LLM-Check Methods (NeurIPS 2024, single-pass)
  llmcheck_attn: true
  llmcheck_hidden: true
  llmcheck_logit: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Discrimination (higher = better)
    - auroc           # Primary metric for Table 1
    - auprc           # Robustness to class imbalance
    - tpr_at_5fpr     # Safety metric (detection at low false positive rate)
    # Calibration (lower = better)
    - ece
    - brier
    # Coverage/Utility (lower = better)
    - aurc
    - risk_80
    - risk_95
    # Correlation (higher = better)
    - pearson
    - spearman
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/grand_challenge"
  save_predictions: true
  save_scores: true

# ==============================================================================
# USAGE NOTES:
# ==============================================================================
# Run full benchmark:
#   python -m experiments.main --config experiments/configs/benchmark_grand_challenge.yaml
#
# Dry run (verify config):
#   python -m experiments.main --config experiments/configs/benchmark_grand_challenge.yaml --dry-run
#
# For 70B model (scaling validation), change:
#   model.name: "meta-llama/Llama-3.1-70B-Instruct"
#   model.device_map: "auto"
#
# Expected Results:
#   AUROC: SelfCheckGPT ≈ AG-SAR > Semantic Entropy > EigenScore > Entropy
#   Latency: AG-SAR (1x) << SelfCheckGPT (500x)
# ==============================================================================
