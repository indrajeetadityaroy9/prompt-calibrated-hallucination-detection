# ============================================================================
# SOTA CORE CLAIMS - NeurIPS 2025 Submission Matrix
# ============================================================================
# AG-SAR vs SelfCheckGPT (SOTA-Sampling) vs LLM-Check (SOTA-Whitebox)
#
# This is the definitive "Table 2" configuration for the submission.
# Run with: python -m experiments.main --config experiments/configs/benchmarks/sota_core_claims.yaml
#
# Estimated Runtime: ~4-6 hours (SelfCheck dominates due to 5x sampling)
#
# CRITICAL: Uses attn_implementation="eager" because AG-SAR requires
# attention weight capture (Flash Attention doesn't expose attention matrices)

experiment:
  name: "sota_core_claims_final"
  description: "NeurIPS 2025 Submission Matrix: AG-SAR vs SelfCheckGPT vs LLM-Check"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "bfloat16"
  device_map: "auto"
  # CRITICAL: Must use "eager" for attention capture (Flash Attention doesn't expose weights)
  attn_implementation: "eager"
  trust_remote_code: true

dataset:
  name: "ALL"  # HaluEval QA, RAGTruth, HaluEval Summ
  num_samples: 500  # N=500 gives ~4% margin of error (statistically significant)
  seed: 42

methods:
  # =========================================================================
  # THE PROPOSED METHOD
  # =========================================================================
  agsar:
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_unified_gating: true
    gate_temperature: 1.0
    memory_weight: 0.5
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "top1_projection"
    aggregation_method: "percentile_10"

  # =========================================================================
  # THE ACCURACY BENCHMARK (Slow) - Manakul et al., 2023
  # =========================================================================
  selfcheck:
    num_samples: 5       # 5 samples is sufficient for comparison
    max_new_tokens: 100
    temperature: 1.0

  # =========================================================================
  # THE DIRECT COMPETITORS - LLM-Check (NeurIPS 2024)
  # =========================================================================
  llmcheck_attn: true    # Attention eigenvalues
  llmcheck_hidden: true  # Hidden state SVD

  # =========================================================================
  # EigenScore - Chen et al., ICLR 2024
  # =========================================================================
  eigenscore:
    num_samples: 5
    max_new_tokens: 50
    temperature: 1.0

  # =========================================================================
  # THE BASELINES (Weak but necessary for completeness)
  # =========================================================================
  logprob: true
  entropy: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc              # Main discrimination metric
    - auprc              # Precision-Recall AUC
    - f1                 # F1 score
    - accuracy           # Classification accuracy
    - ece                # Expected Calibration Error (lower=better)
    - brier              # Brier score (lower=better)
    - aurc               # Area Under Risk-Coverage
    - risk_90            # Risk when rejecting bottom 10%
    - tpr_at_5fpr        # Critical Safety Metric (TPR at 5% FPR)
    - spearman           # Rank correlation
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/sota_core_claims_final"
  save_predictions: true
  save_scores: true
