# ============================================================================
# REPRODUCE MAIN RESULTS (Table 1, Section 4)
# ============================================================================
# This is the canonical configuration for reproducing the paper's main results.
# Run with: python -m experiments.main --config experiments/configs/benchmarks/reproduce_main_results.yaml

experiment:
  name: "reproduce_main_results"
  description: "Canonical configuration for Table 1 (Main SOTA Comparison)"

dataset:
  name: "ALL"  # HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA
  num_samples: 1000  # Per dataset (4000 total)
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention capture
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Authority Flow (Eq. 3-4)
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating (Eq. 4)
    gate_temperature: 1.0
    memory_weight: 0.5
    # Semantic Dispersion (Eq. 5-6)
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "nucleus_variance"
    # CPG Detection (Eq. 8) - always enabled
    cpg_gate_threshold: 0.3
    cpg_dispersion_threshold: 0.05
    cpg_confidence_threshold: 0.9
  # Baselines
  logprob: true
  entropy: true
  llmcheck_attn: true
  llmcheck_hidden: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc     # Primary metric (Table 1)
    - auprc
    - f1
    - tpr_at_5fpr
    - ece       # Calibration
    - brier
    - aurc      # Selective prediction
    - risk_90
    - spearman  # Ranking correlation
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/reproduce_main_results"
  save_predictions: true
  save_scores: true
