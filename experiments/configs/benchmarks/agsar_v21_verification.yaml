# =============================================================================
# AG-SAR v21 SOLO VERIFICATION RUN
# =============================================================================
# Quick validation (~30-45 min) before full baseline comparison
# Tests v21 Prompt-Gated Fusion across Confusion vs Deception scenarios
# =============================================================================

experiment:
  name: "agsar_v21_verification"
  description: "Solo verification of AG-SAR v21 across all failure modes"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "bfloat16"
  device_map: "auto"
  attn_implementation: "sdpa"
  trust_remote_code: true
  batch_size: 1

# Run ALL 4 core datasets:
# - halueval_qa: Confusion (fabrication)
# - halueval_summarization: Mixed (long-form)
# - ragtruth: Deception (context override)
# - fava: Fine-grained attribution
dataset:
  name: "ALL"
  num_samples: 300
  seed: 42

methods:
  # ONLY AG-SAR v21 - Prompt-Gated Fusion
  agsar:
    version: 21
    semantic_layers: 4
    jsd_top_k: 50
    varentropy_scale: 3.0
    prompt_gate_threshold: 3.0
    prompt_gate_slope: 1.0

evaluation:
  confidence_threshold: 0.5
  bootstrap_samples: 1000
  confidence_level: 0.95
  metrics:
    # Discrimination
    - "auroc"
    - "auprc"
    - "f1"
    - "accuracy"
    # Safety (Critical for SOTA claims)
    - "tpr_at_5fpr"
    # Calibration
    - "ece"
    - "brier"
    # Risk-Coverage
    - "aurc"
    - "risk_90"

output:
  output_dir: "results/agsar_verification"
  save_predictions: true
  save_scores: true
