# ==============================================================================
# AG-SAR: Grand Challenge - SLOW METHODS (GPU 1)
# ==============================================================================
# Run this on cuda:1 while fast methods run on cuda:0
# Usage: CUDA_VISIBLE_DEVICES=1 python -m experiments.main --config experiments/configs/benchmark_grand_challenge_slow.yaml
# ==============================================================================

experiment:
  name: "grand_challenge_slow"
  description: "Sampling-based methods (SelfCheck, Semantic Entropy, EigenScore)"

dataset:
  name: "ragtruth"
  num_samples: 1000
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "cuda:0"  # Will be cuda:0 from CUDA_VISIBLE_DEVICES perspective
  trust_remote_code: true
  batch_size: 1  # Must be 1 for sampling methods

methods:
  # Sampling-based methods only (~500x latency)
  selfcheck:
    num_samples: 5
    max_new_tokens: 256
    temperature: 0.7
    generation_batch_size: 5

  semantic_entropy:
    num_samples: 5
    similarity_threshold: 0.8
    embedding_model: "all-MiniLM-L6-v2"
    max_new_tokens: 256
    temperature: 0.7

  eigenscore:
    num_samples: 5
    max_new_tokens: 50
    temperature: 1.0

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
    - risk_80
    - risk_95
    - pearson
    - spearman
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/grand_challenge_slow"
  save_predictions: true
  save_scores: true
