# AG-SAR Only Evaluation - Tests conservative aggregation
# Purpose: Compare mean vs percentile_10 aggregation for safety detection
# Runs only AG-SAR method (no baselines) on all 4 datasets

experiment:
  name: "agsar_only"
  description: "AG-SAR v8.0 with conservative aggregation testing"

dataset:
  name: "ALL"  # Load all 4 datasets: HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA
  num_samples: 1000  # Per dataset (4000 total)
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention weight extraction
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR v8.0 Gold Master
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    # Semantic Dispersion
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    # Conservative Aggregation for Safety
    # Options: "mean" (ranking), "min" (most conservative), "percentile_10", "percentile_25"
    aggregation_method: "percentile_10"  # Conservative for better TPR@5%FPR
    # Post-hoc Calibration (fixes ECE without hurting ranking)
    # T > 1.0 softens overconfident scores, T < 1.0 sharpens
    calibration_temperature: 1.8  # Reduce overconfidence (ECE was 0.24-0.35)
  # All baselines disabled for focused AG-SAR testing
  logprob: false
  entropy: false
  llmcheck_attn: false
  llmcheck_hidden: false

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Full 10-metric suite (no exceptions)
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
    - risk_90
    - spearman
    # Latency tracked separately by engine
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/agsar_only"
  save_predictions: true
  save_scores: true
