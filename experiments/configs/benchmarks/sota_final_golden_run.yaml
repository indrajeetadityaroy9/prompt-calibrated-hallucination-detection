# =============================================================================
# AG-SAR FINAL GOLDEN RUN - NeurIPS 2025 Submission Artifact
# =============================================================================
#
# This config generates the SINGLE SOURCE OF TRUTH for all paper numbers.
# All bug fixes have been applied. Results from this run are definitive.
#
# Expected runtime: 4-6 hours on H100
# =============================================================================

experiment:
  name: "sota_final_golden_run"
  description: "NeurIPS 2025 Final Artifact: AG-SAR v21 vs SOTA Baselines"

# === MODEL ===
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "bfloat16"
  device_map: "auto"
  attn_implementation: "sdpa"  # Flash Attention 2 if available
  trust_remote_code: true
  batch_size: 1  # Single sample for fair latency comparison

# === DATASET GAUNTLET ===
# Using ALL to run the 4 core datasets:
# - halueval_qa: Confusion baseline (fabrication)
# - halueval_summarization: Long-form confusion
# - ragtruth: Deception baseline (context override)
# - fava: Fine-grained attribution
dataset:
  name: "ALL"
  num_samples: 500
  seed: 42

# === METHODS ===
methods:
  # The Proposed Solution: v21 Prompt-Gated Fusion
  agsar:
    version: 21
    semantic_layers: 4
    jsd_top_k: 50
    varentropy_scale: 3.0
    prompt_gate_threshold: 3.0
    prompt_gate_slope: 1.0

  # Baselines (single-pass, no sampling)
  logprob: true
  entropy: true

  # Competitors (require sampling - slower but accurate)
  selfcheck:
    num_samples: 5
    max_new_tokens: 100
    temperature: 1.0

  eigenscore:
    num_samples: 5
    max_new_tokens: 50
    temperature: 1.0

  # SAPLMA (trainable probe)
  saplma: true

  # LLMCheck variants
  llmcheck_attn: true
  llmcheck_hidden: true
  llmcheck_logit: true

# === EVALUATION METRICS ===
evaluation:
  confidence_threshold: 0.5
  bootstrap_samples: 1000
  confidence_level: 0.95
  metrics:
    # Discrimination (Main Table)
    - "auroc"
    - "auprc"
    - "f1"
    - "accuracy"

    # Safety & Calibration (Appendix)
    - "tpr_at_5fpr"     # Critical: Catch hallucinations at low false alarm
    - "ece"             # Expected Calibration Error
    - "brier"           # Brier Score

    # Risk-Coverage (Selective Prediction)
    - "aurc"            # Area Under Risk-Coverage
    - "risk_90"         # Risk at 90% coverage

    # Correlation Analysis
    - "spearman"

# === OUTPUT ===
output:
  output_dir: "results/final_submission"
  save_predictions: true
  save_scores: true
