# Stage 5: Full Baseline Comparison
# Purpose: Compare all baselines fairly with publication-quality CI
# Runtime: ~7 hours (reduced from 17+ hours by using 1000 samples)

experiment:
  name: "stage5_full_comparison"
  description: "Publication-quality baseline comparison"

dataset:
  name: halueval_qa
  num_samples: 1000  # Reduced for SelfCheckGPT runtime
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "sdpa"
  device_map: "cuda:0"  # Single GPU optimization
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
    power_iteration_steps: 3
    residual_weight: 0.5
    lambda_roughness: 10.0
  logprob: true
  entropy: true
  # NOTE: SelfCheck in exp4 only (SOTA comparison config)
  eigenscore: true

evaluation:
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/stage5_baselines"
  save_predictions: true
  save_scores: true

# Runtime Consideration (SelfCheckGPT):
# - 1000 samples x 5 generations = 5000 generations
# - At ~5s/generation = ~7 hours total
# - Statistical Note: 1000 samples gives AUROC CI width < 0.025
