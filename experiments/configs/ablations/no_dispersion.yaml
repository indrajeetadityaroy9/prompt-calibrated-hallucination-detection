# Ablation: Disable Semantic Dispersion (v7.0)
# Tests Authority Flow + Unified Gating without consistency check
#
# This reproduces v7.0 for paper comparison:
# - Authority Flow (recursive prompt recharge)
# - Stability gating (context-dependent RAG/free-gen)
# - No semantic dispersion
#
# Expected: Lower AUROC than baseline, demonstrating dispersion contribution

experiment:
  name: "ablation_no_dispersion"
  description: "v7.0 - Authority Flow + Gating without Semantic Dispersion"

dataset:
  name: "ragtruth"
  num_samples: null  # Full dataset
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "auto"
  trust_remote_code: true

methods:
  agsar:
    # v7.0 configuration
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # ENABLED: Unified Gating
    enable_unified_gating: true
    gate_temperature: 1.0
    memory_weight: 0.5
    # DISABLED: Semantic Dispersion
    enable_semantic_dispersion: false
    # Aggregation
    aggregation_method: "mean"
  logprob: true  # Compare against baseline

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/ablation_no_dispersion"
  save_predictions: true
  save_scores: true
