# Ablation: Single Layer vs Late-Layer Focus
# Tests if multi-layer analysis helps
#
# Default baseline uses semantic_layers=4 (last 4 layers).
# This ablation uses semantic_layers=1 (only final layer).
#
# Expected: Lower AUROC, demonstrating multi-layer contribution

experiment:
  name: "ablation_single_layer"
  description: "Single layer (final only) vs multi-layer focus"

dataset:
  name: "ragtruth"
  num_samples: null  # Full dataset
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "auto"
  trust_remote_code: true

methods:
  agsar:
    # Single layer configuration
    semantic_layers: 1  # Only final layer (vs default 4)
    power_iteration_steps: 3
    residual_weight: 0.5
    # Full baseline features
    enable_unified_gating: true
    gate_temperature: 1.0
    memory_weight: 0.5
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "top1_projection"
    aggregation_method: "mean"
  logprob: true  # Compare against baseline

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/ablation_single_layer"
  save_predictions: true
  save_scores: true
