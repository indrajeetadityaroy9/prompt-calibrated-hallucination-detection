# Ablation: Disable Unified Gating (pure-authority-flow baseline)
# Tests Authority Flow alone without context-dependent gating
#
# This reproduces the pure-authority-flow baseline for paper comparison:
# - Pure Authority Flow (recursive prompt recharge)
# - No stability gating
# - No semantic dispersion
#
# Expected: Lower AUROC than baseline, demonstrating gating contribution

experiment:
  name: "ablation_no_gating"
  description: "pure-authority-flow baseline - Authority Flow without Unified Gating"

dataset:
  name: "ragtruth"
  num_samples: null  # Full dataset
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "auto"
  trust_remote_code: true

methods:
  agsar:
    # pure-authority-flow baseline configuration
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # DISABLED: Unified Gating
    enable_unified_gating: false
    # DISABLED: Semantic Dispersion
    enable_semantic_dispersion: false
    # Aggregation (use same as SOTA for fair comparison)
    aggregation_method: "mean"
  logprob: true  # Compare against baseline

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/ablation_no_gating"
  save_predictions: true
  save_scores: true
