run:
  mode: ablation

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "eager"

evaluation:
  datasets: ["triviaqa"]
  n_samples: 100
  max_new_tokens: 64
  max_context_chars: 2000
  seed: 42

ablation:
  signals: ["rho", "phi", "spf", "mlp", "ent"]

output:
  dir: "results/ablation"
