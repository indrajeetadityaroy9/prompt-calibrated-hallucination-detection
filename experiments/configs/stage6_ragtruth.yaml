# Stage 6: Generalization (RAGTruth)
# Purpose: Test on natural hallucinations (different distribution)

experiment:
  name: "stage6_ragtruth_generalization"
  description: "Test AG-SAR generalization on RAGTruth natural hallucinations"

dataset:
  name: ragtruth
  num_samples: 1000
  seed: 42
  # task_type: null  # Use all task types
  # filter_refusals: true  # Uncomment to filter "I don't know" responses

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "sdpa"
  device_map: "cuda:0"  # Single GPU optimization
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
  logprob: true
  entropy: true

evaluation:
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/stage6_ragtruth"
  save_predictions: true
  save_scores: true

# RAGTruth Label Caveat:
# - Contains "refusal" responses ("I don't know") labeled as Fact
# - These have naturally high uncertainty, causing False Positives
# - Enable filter_refusals: true to filter these out
# - Or document as limitation: "Refusals treated as high-uncertainty events"

# Validation Criteria:
# - AUROC > 0.55 (harder dataset, lower bar)
# - Refusal filter removes < 20% of samples (otherwise dataset is compromised)
