# ==============================================================================
# AG-SAR: Grand Challenge - FAST METHODS (GPU 0)
# ==============================================================================
# Run this on cuda:0 while slow methods run on cuda:1
# Usage: CUDA_VISIBLE_DEVICES=0 python -m experiments.main --config experiments/configs/benchmark_grand_challenge_fast.yaml
# ==============================================================================

experiment:
  name: "grand_challenge_fast"
  description: "Fast single-pass methods (AG-SAR, Entropy, LogProb, LLM-Check)"

dataset:
  name: "ragtruth"
  num_samples: 1000
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true
  batch_size: 8  # Can batch since no sampling overhead

methods:
  # Single-pass methods only (~1x latency)
  agsar:
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "centroid_variance"

  entropy: true
  logprob: true
  saplma: true
  llmcheck_attn: true
  llmcheck_hidden: true
  llmcheck_logit: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
    - risk_80
    - risk_95
    - pearson
    - spearman
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/grand_challenge_fast"
  save_predictions: true
  save_scores: true
