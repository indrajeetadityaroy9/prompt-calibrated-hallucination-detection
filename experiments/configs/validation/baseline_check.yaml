# Baseline Validation
# AG-SAR v8.0 on RAGTruth for validation

experiment:
  name: "validate_baseline"
  description: "AG-SAR v8.0 baseline on RAGTruth"

dataset:
  name: "ragtruth"
  num_samples: 500
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR v8.0
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "top1_projection"
  logprob: false
  entropy: false

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - ece
    - brier
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/validate_baseline"
  save_predictions: true
  save_scores: true
