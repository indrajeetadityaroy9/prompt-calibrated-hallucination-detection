# CI Smoke Test Configuration
# Purpose: Validate full pipeline before production runs
# Duration: ~5 minutes
# Checks: JSONL writing, Resume logic, NaN handling

experiment:
  name: "00_ci_smoke_test"
  description: "5-minute validation of full AG-SAR pipeline"

dataset:
  name: halueval_qa
  num_samples: 10
  seed: 42

model:
  name: "gpt2"
  dtype: "float32"
  device_map: "auto"
  attn_implementation: "eager"

methods:
  agsar:
    semantic_layers: 2
    power_iteration_steps: 2
  logprob: true
  entropy: true

evaluation:
  metrics:
    # Discrimination (higher=better)
    - auroc
    - auprc
    - auprc_factual
    # Classification (higher=better)
    - f1
    - precision
    - recall
    - accuracy
    # Calibration (lower=better)
    - ece
    - brier
    # Coverage & Utility (lower=better)
    - aurc
    - risk_80
    - risk_90
    - risk_95
    # Correlation (higher=better)
    - spearman
    - pearson
    - pointbiserial
  bootstrap_samples: 100
  confidence_level: 0.95

output:
  output_dir: "results/00_ci_smoke_test"
  save_predictions: true
  save_scores: true
