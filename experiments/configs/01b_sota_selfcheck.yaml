# Sampling-Based Methods Comparison (Table 1 - Pareto Frontier)
# Purpose: Compare AG-SAR vs sampling-based methods (SelfCheck, EigenScore)
#
# Both SelfCheck and EigenScore require multiple generations per sample,
# making them ~500x slower than AG-SAR. We run on N=100 for tractability.

experiment:
  name: "01b_sota_selfcheck"
  description: "Sampling-based methods comparison (SelfCheck + EigenScore)"

dataset:
  name: "halueval_qa"
  num_samples: 100  # Subset due to SelfCheck latency
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention weight extraction
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR v8.0 Gold Master (same config for apples-to-apples)
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  selfcheck:
    num_samples: 5
    max_new_tokens: 256
    temperature: 0.7
    generation_batch_size: 5
  eigenscore:
    num_samples: 5
    max_new_tokens: 50
    temperature: 1.0

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Discrimination metrics only (for Pareto comparison)
    - auroc
    - auprc
    - aurc
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/01b_sota_selfcheck"
  save_predictions: true
  save_scores: true

# Paper footnote: "SelfCheckGPT evaluated on N=100 subset due to
# computational constraints (500x latency vs AG-SAR)."
