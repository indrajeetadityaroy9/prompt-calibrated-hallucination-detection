# Scaling Law Test (Figure 2)
# Purpose: Verify AG-SAR scales to 70B parameters
# REQUIREMENTS: 2× H100 80GB (140GB+ VRAM needed)
# Paper Contribution: Demonstrates AG-SAR works at scale

experiment:
  name: "02_scaling_law"
  description: "AG-SAR scaling test on Llama-3.1-70B"

dataset:
  name: halueval_qa
  num_samples: 200  # Reduced for 70B cost
  seed: 42

model:
  name: "meta-llama/Llama-3.1-70B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "sdpa"
  device_map: "balanced"  # Splits across 2x H100
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
  logprob: true   # CRITICAL: Required for fair scaling comparison
  entropy: true   # CRITICAL: Required for fair scaling comparison

evaluation:
  metrics:
    # Discrimination (higher=better)
    - auroc
    - auprc
    - auprc_factual
    # Classification (higher=better)
    - f1
    - precision
    - recall
    - accuracy
    # Calibration (lower=better)
    - ece
    - brier
    # Coverage & Utility (lower=better)
    - aurc
    - risk_80
    - risk_90
    - risk_95
    # Correlation (higher=better)
    - spearman
    - pearson
    - pointbiserial
  bootstrap_samples: 200  # Fewer for reduced samples
  confidence_level: 0.95

output:
  output_dir: "results/02_scaling_law"
  save_predictions: true
  save_scores: true

# Validation Criteria:
# - Model loads without OOM
# - AUROC comparable to 8B (within 0.15)
# - Latency < 10x of 8B (due to multi-GPU overhead)
