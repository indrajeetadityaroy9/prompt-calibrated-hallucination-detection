# Qwen Architecture Test (Discussion)
# Purpose: Prove AG-SAR generalizes to Qwen architecture (different attention impl)
# Uses English dataset - architecture proof, not multilingual capability

experiment:
  name: "05_qwen_arch"
  description: "Architecture generalization test on Qwen-2.5-32B (English)"

dataset:
  name: "ALL"  # Load all 4 datasets: HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA
  num_samples: 500  # Per dataset (2000 total)
  seed: 42

model:
  name: "Qwen/Qwen2.5-32B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "eager"  # Required for attention weight extraction
  device_map: "cuda:0"  # 65GB, fits on single H100
  trust_remote_code: true
  batch_size: 4  # Reduced to prevent OOM with eager attention

methods:
  agsar:
    # Core AG-SAR baseline
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    gate_temperature: 1.0
    memory_weight: 0.5
    # Semantic Dispersion
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  logprob: true
  entropy: true
  # LLM-Check methods (NeurIPS 2024) - zero-shot, single-pass
  llmcheck_attn: true
  llmcheck_hidden: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Full 10-metric suite (no exceptions)
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
    - risk_90
    - spearman
    # Latency tracked separately by engine
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/05_qwen_arch"
  save_predictions: true
  save_scores: true

# Validation Criteria:
# - AUROC > 0.80 proves architecture support
# - ECE < 0.15 proves calibration holds
