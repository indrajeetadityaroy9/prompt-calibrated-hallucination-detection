# Long Context Test (Table 2)
# Purpose: Test AG-SAR on longer sequences from HaluEval Summarization
# Validates that Authority Flow works with extended context windows

experiment:
  name: "04_long_context"
  description: "Long context test on HaluEval Summarization (longer sequences)"

dataset:
  name: "ALL"  # Load all 4 datasets: HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA
  num_samples: 500  # Per dataset (2000 total)
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Must use sdpa for attention weight extraction
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR baseline
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    gate_temperature: 1.0
    memory_weight: 0.5
    # Semantic Dispersion
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  logprob: true
  entropy: true
  # LLM-Check methods (NeurIPS 2024) - zero-shot, single-pass
  llmcheck_attn: true
  llmcheck_hidden: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Full 10-metric suite (no exceptions)
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
    - risk_90
    - spearman
    # Latency tracked separately by engine
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/04_long_context"
  save_predictions: true
  save_scores: true
