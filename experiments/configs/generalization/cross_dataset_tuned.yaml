# RAGTruth Generalization - v8.5 Configuration
# Clean configuration with obsolete parameters removed

experiment:
  name: "03_generalization_tuned"
  description: "RAGTruth with v8.5 unified gating and semantic dispersion"

dataset:
  name: "ragtruth"
  num_samples: 100
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Scaled Dot Product Attention (required for weight capture)
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating - enabled
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    # Semantic Dispersion - enabled
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    # v8.5 Features - disabled (did not improve RAGTruth performance)
    head_focus_k: 0  # 0 = use all heads
    enable_surprisal_weighting: false
  logprob: true
  entropy: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - precision
    - recall
    - accuracy
    - ece
    - brier
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/03_generalization_tuned"
  save_predictions: true
  save_scores: true
