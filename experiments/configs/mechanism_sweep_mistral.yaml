# ==============================================================================
# MECHANISM SWEEP: Mistral-7B (Architecture Hypothesis)
# ==============================================================================
# Hypothesis: Different architectures have different context reliance defaults.
# Prediction: Mistral may have different Gate distribution than Llama.
# ==============================================================================

experiment:
  name: "mechanism_sweep_mistral"
  description: "Architecture hypothesis: Does Mistral handle context differently?"

dataset:
  name: "halueval_qa"
  num_samples: 300
  seed: 42

model:
  name: "mistralai/Mistral-7B-Instruct-v0.3"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "cuda:0"

methods:
  agsar:
    semantic_layers: 4
    enable_unified_gating: true
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_method: "top1_projection"
    aggregation_method: "mean"
    calibration_temperature: 1.0

evaluation:
  metrics:
    - auroc
    - auprc
    - spearman
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/mechanism_sweep/mistral7b"
  save_predictions: true
  save_scores: true
