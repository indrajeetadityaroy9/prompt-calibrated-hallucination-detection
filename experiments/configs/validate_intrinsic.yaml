# Intrinsic Detection Validation
# Validates Truth Vector integration with Dynamic Blending
#
# Hypothesis: No regression on RAGTruth (AUROC >= 0.76)
# Improvement expected on low-gate samples (where context is ignored)
#
# Dynamic Blending: trust = Gate × JEPA_trust + (1-Gate) × intrinsic_trust

experiment:
  name: "validate_intrinsic"
  description: "Validate Truth Vector integration on RAGTruth"

dataset:
  name: "ragtruth"
  num_samples: 500  # Enough for statistical significance
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention weight capture
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR v8.0
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    # Semantic Dispersion (JEPA)
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "top1_projection"
    # v12.0 Intrinsic Detection (Truth Vector)
    enable_intrinsic_detection: true
    truth_vector_path: "data/truth_vectors/llama_3.1_8b_instruct.pt"
  logprob: true
  entropy: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - ece
    - brier
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/validate_intrinsic"
  save_predictions: true
  save_scores: true
