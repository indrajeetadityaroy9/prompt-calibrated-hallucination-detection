# Experiment 2: HaluEval Summarization Benchmark
# Paper Section 4.1: Synthetic Hallucination Detection (Summarization)
#
# Tests hallucination detection on document summarization task.
# Different from QA because responses are longer and more complex.

experiment:
  name: "exp2_halueval_summ"
  description: "Benchmark on HaluEval Summarization with AG-SAR and baselines"

dataset:
  name: "halueval_summarization"
  num_samples: 1000
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "sdpa"
  dtype: "bfloat16"
  device_map: "auto"
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_register_filter: true
    enable_spectral_roughness: true
    kurtosis_threshold: 2.0
    lambda_roughness: 10.0
    ema_decay: 0.995
    sink_token_count: 4
  logprob: true
  entropy: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/exp2_halueval_summ"
  save_predictions: true
  save_scores: true
