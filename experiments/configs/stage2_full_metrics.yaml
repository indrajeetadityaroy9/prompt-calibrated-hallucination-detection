# Stage 2: Single-Model Full Metrics (Llama-3.1-8B)
# Purpose: Validate all ICML metrics on primary model

experiment:
  name: "stage2_full_metrics"
  description: "Validate all 5 ICML metrics on Llama-3.1-8B"

dataset:
  name: halueval_qa
  num_samples: 500
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "sdpa"
  device_map: "cuda:0"  # Single GPU optimization
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
    power_iteration_steps: 3
    residual_weight: 0.5
  logprob: true
  entropy: true

evaluation:
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/stage2_full_metrics"
  save_predictions: true
  save_scores: true
