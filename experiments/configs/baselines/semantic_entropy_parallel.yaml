# ==============================================================================
# AG-SAR: Parallel Slow Track - SemanticEntropy + AG-SAR
# ==============================================================================
# Usage: CUDA_VISIBLE_DEVICES=X python -m experiments.main --config experiments/configs/parallel_semantic_entropy.yaml
# ==============================================================================

experiment:
  name: "parallel_semantic_entropy"
  description: "Semantic Entropy with AG-SAR baseline"

dataset:
  name: "ragtruth"
  num_samples: 100
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true
  batch_size: 1

methods:
  # AG-SAR baseline for direct comparison
  agsar:
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "centroid_variance"

  # Semantic Entropy (sampling-based)
  semantic_entropy:
    num_samples: 5
    similarity_threshold: 0.8
    max_new_tokens: 256
    temperature: 0.7

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/parallel_semantic_entropy"
  save_predictions: true
  save_scores: true
