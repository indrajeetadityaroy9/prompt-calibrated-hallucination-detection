# Stage 4: Scale Test (70B)
# Purpose: Verify AG-SAR works at 70B scale
# REQUIREMENTS: 2× H100 80GB (140GB+ VRAM needed)
# SKIP if running on 1× H100 - use stage4_scale_8b_to_32b.yaml instead

experiment:
  name: "stage4_scale_70b"
  description: "Test AG-SAR on Llama-3.1-70B (multi-GPU)"

dataset:
  name: halueval_qa
  num_samples: 200  # Reduced for 70B cost
  seed: 42

model:
  name: "meta-llama/Llama-3.1-70B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "sdpa"
  device_map: "balanced"  # Splits across 2x H100
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
  logprob: true   # CRITICAL: Required for fair scaling comparison
  entropy: true   # CRITICAL: Required for fair scaling comparison

evaluation:
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 200  # Fewer for reduced samples
  confidence_level: 0.95

output:
  output_dir: "results/stage4_scale_70b"
  save_predictions: true
  save_scores: true

# Validation Criteria:
# - Model loads without OOM
# - AUROC comparable to 8B (within 0.15)
# - Latency < 10x of 8B (due to multi-GPU overhead)
