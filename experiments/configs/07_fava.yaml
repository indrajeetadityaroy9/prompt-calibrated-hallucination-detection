# FAVA Benchmark - Fine-grained Hallucination Detection
# Dataset: fava-uw/fava-data (HuggingFace)
#
# FAVA contains passages with XML-annotated hallucination errors across 6 categories:
# - entity: Factual errors (wrong named entities)
# - relation: Relationship/context errors
# - invented: Completely fabricated claims
# - contradictory: Self-contradicting statements
# - unverifiable: Claims without reference support
# - subjective: Opinion presented as fact
#
# This tests AG-SAR on fine-grained, naturally occurring hallucinations.

experiment:
  name: "07_fava"
  description: "FAVA fine-grained hallucination detection benchmark"

dataset:
  name: "ALL"  # Load all 4 datasets: HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA
  num_samples: 1000  # Per dataset (4000 total)
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention weight extraction
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR v8.0 Gold Master
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    # Semantic Dispersion
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  logprob: true
  entropy: true
  # LLM-Check methods (NeurIPS 2024) - zero-shot, single-pass
  llmcheck_attn: true
  llmcheck_hidden: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Full 10-metric suite (no exceptions)
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
    - risk_90
    - spearman
    # Latency tracked separately by engine
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/07_fava"
  save_predictions: true
  save_scores: true
