# MoE Architecture Test (Discussion)
# Purpose: Prove AG-SAR is robust to dynamic compute paths (MoE Routing)
# Paper Contribution: MoE architecture support demonstration

experiment:
  name: "06_moe_arch"
  description: "Architecture test on Mixtral-8x7B MoE"

dataset:
  name: "ALL"  # Load all 4 datasets: HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA
  num_samples: 500  # Per dataset (2000 total)
  seed: 42

model:
  name: "mistralai/Mixtral-8x7B-Instruct-v0.1"
  dtype: "bfloat16"
  attn_implementation: "eager"  # Required for attention weight extraction
  device_map: "balanced"  # Splits across 2x H100 (~95GB)
  trust_remote_code: true
  batch_size: 2  # Reduced to prevent OOM with eager attention

methods:
  agsar:
    # Core AG-SAR v8.0 Gold Master
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    # Semantic Dispersion
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  logprob: true
  entropy: true
  # LLM-Check methods (NeurIPS 2024) - zero-shot, single-pass
  llmcheck_attn: true
  llmcheck_hidden: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Full 10-metric suite (no exceptions)
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
    - risk_90
    - spearman
    # Latency tracked separately by engine
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/06_moe_arch"
  save_predictions: true
  save_scores: true

# Validation Criteria:
# - AUROC > 0.80 proves MoE support
# - ECE < 0.15 proves calibration with dynamic routing
