# Scaling Law Test on RAGTruth - TUNED tuned Configuration
# Purpose: Test if 70B's sharper attention heads improve detection on natural hallucinations
# REQUIREMENTS: 2× H100 80GB (140GB+ VRAM needed)
#
# Hypothesis: Larger models have sharper attention heads, so Authority Flow
# should be cleaner without needing Register Filter or MLP Divergence.
# Comparison: 8B RAGTruth AUROC was 0.7168, expecting improvement with 70B.

experiment:
  name: "02_scaling_law_ragtruth"
  description: "AG-SAR tuned-tuned scaling test on Llama-3.1-70B with RAGTruth"

dataset:
  name: ragtruth
  num_samples: 100
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-70B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "eager"
  device_map: "balanced"  # Splits across 2x H100
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Register Filter - DISABLED (tuned-tuned: over-masks on Llama-3)
    enable_register_filter: false
    kurtosis_threshold: 2.0
    ema_decay: 0.995
    sink_token_count: 4
    # MLP Divergence - DISABLED (tuned-tuned: weak on natural errors)
    enable_spectral_roughness: false
    lambda_roughness: 10.0
    # Unified Gating - ENABLED
    enable_unified_gating: true
    gate_temperature: 1.0
    memory_weight: 0.5
    # Semantic Dispersion - ENABLED
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  logprob: true
  entropy: true

evaluation:
  metrics:
    # Discrimination (higher=better)
    - auroc
    - auprc
    - auprc_factual
    # Classification (higher=better)
    - f1
    - precision
    - recall
    - accuracy
    # Calibration (lower=better)
    - ece
    - brier
  bootstrap_samples: 200
  confidence_level: 0.95

output:
  output_dir: "results/02_scaling_law_ragtruth"
  save_predictions: true
  save_scores: true

# Validation Criteria:
# - Model loads without OOM
# - AUROC improvement over 8B (baseline: 0.7168)
# - Latency < 10x of 8B (due to multi-GPU overhead)
