# Verification Sprint: 8B eager check (20 samples)
experiment:
  name: "_verify_8b"
  description: "Quick verification of eager attention"

dataset:
  name: "halueval_qa"
  num_samples: 20
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_unified_gating: true
    enable_semantic_dispersion: true
  logprob: true

evaluation:
  metrics: [auroc]
  bootstrap_samples: 100

output:
  output_dir: "results/_verify_8b"
