# Verification Sprint: 70B OOM check (8 samples)
experiment:
  name: "_verify_70b"
  description: "Quick verification of 70B memory fit"

dataset:
  name: "halueval_qa"
  num_samples: 8
  seed: 42

model:
  name: "meta-llama/Llama-3.1-70B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "balanced"
  trust_remote_code: true
  batch_size: 2

methods:
  agsar:
    semantic_layers: 4
    enable_unified_gating: true
    enable_semantic_dispersion: true
  logprob: true

evaluation:
  metrics: [auroc]
  bootstrap_samples: 100

output:
  output_dir: "results/_verify_70b"
