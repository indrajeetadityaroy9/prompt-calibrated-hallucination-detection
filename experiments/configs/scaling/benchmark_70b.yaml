# ==============================================================================
# AG-SAR: Scaling Validation (70B) - Figure 2
# ==============================================================================
# This configuration validates AG-SAR scales to 70B parameter models.
# Requires 2x H100 GPUs (~140GB VRAM for BF16).
#
# Usage: python -m experiments.main --config experiments/configs/benchmark_scaling_70b.yaml
# ==============================================================================

experiment:
  name: "scaling_70b"
  description: "Scaling validation on Llama-3.1-70B-Instruct (Figure 2)"

dataset:
  name: "ragtruth"
  num_samples: 200  # Smaller subset due to 70B inference cost
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-70B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "auto"  # Distributes across both H100s
  trust_remote_code: true
  batch_size: 1

methods:
  # AG-SAR only for scaling validation
  agsar:
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_unified_gating: true
    gate_temperature: 1.0
    memory_weight: 0.5
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "centroid_variance"

  # Fast baselines for comparison
  entropy: true
  logprob: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - ece
    - aurc
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/scaling_70b"
  save_predictions: true
  save_scores: true
