# Generalization Test with v3.1 (Pure Authority Flow - No Gating/Dispersion)
# Tests if disabling v8.0 mechanisms improves generalization to natural hallucinations

experiment:
  name: "03_generalization_v31"
  description: "RAGTruth generalization test with v3.1 (pure Authority Flow)"

dataset:
  name: "ragtruth"
  num_samples: 1000
  seed: 42
  task_type: "QA"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "flash_attention_2"
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Register Filter
    enable_register_filter: true
    kurtosis_threshold: 2.0
    ema_decay: 0.995
    sink_token_count: 4
    # Authority Flow (always enabled)
    enable_spectral_roughness: true
    lambda_roughness: 10.0
    # v3.1 MODE: DISABLE Unified Gating and Semantic Dispersion
    enable_unified_gating: false
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    enable_semantic_dispersion: false
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  logprob: true
  entropy: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - precision
    - recall
    - accuracy
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/03_generalization_v31"
  save_predictions: true
  save_scores: true
