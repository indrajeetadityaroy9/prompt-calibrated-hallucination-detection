run:
  mode: evaluation

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "eager"

evaluation:
  datasets: ["triviaqa", "squad"]
  n_samples: 200
  max_new_tokens: 64
  f1_threshold: 0.3
  max_context_chars: 2000
  seed: 42

output:
  dir: "results"
