# Generalization Test (Table 2)
# Paper Section 4.2: Generalization to Natural Hallucinations
#
# Tests if AG-SAR generalizes from synthetic (HaluEval) to natural
# hallucinations from real RAG systems. RAGTruth has ~18% positive rate.

experiment:
  name: "03_generalization"
  description: "Generalization test on RAGTruth natural hallucinations"

dataset:
  name: "ALL"  # Load all 4 datasets: HaluEval QA, RAGTruth QA, HaluEval Summ, FAVA
  num_samples: 1000  # Per dataset (4000 total)
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Must use sdpa for attention weight extraction
  dtype: "bfloat16"
  device_map: "cuda:0"
  trust_remote_code: true

methods:
  agsar:
    # Core AG-SAR v8.0 Gold Master (same as 01_main_sota)
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    stability_sensitivity: 1.0
    parametric_weight: 0.5
    # Semantic Dispersion
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
  logprob: true
  entropy: true
  # LLM-Check methods (NeurIPS 2024) - zero-shot, single-pass
  llmcheck_attn: true
  llmcheck_hidden: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Full 10-metric suite (no exceptions)
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - ece
    - brier
    - aurc
    - risk_90
    - spearman
    # Latency tracked separately by engine
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/03_generalization"
  save_predictions: true
  save_scores: true

# Note: RAGTruth has ~18% hallucination rate (imbalanced)
# AUPRC is the primary metric as it's honest for class imbalance
