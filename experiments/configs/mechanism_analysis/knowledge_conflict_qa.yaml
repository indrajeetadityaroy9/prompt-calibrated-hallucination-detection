# ==============================================================================
# SCIENTIFIC EVALUATION: PROVING EPISTEMIC CONFUSION
# ==============================================================================
# Hypothesis: QA tasks force high context reliance (Gate > 0.5).
# Failures here represent "Confusion", not "Stubbornness".
#
# This is the counter-experiment to RAGTruth. By comparing:
#   - RAGTruth (Summarization): Expected Stubbornness-dominated
#   - HaluEval-QA (Question Answering): Expected Confusion-dominated
#
# We prove "Double Dissociation" - task structure dictates error mechanism.
# ==============================================================================

experiment:
  name: "knowledge_conflict_qa"
  description: "Counter-experiment: Proving Epistemic Confusion on QA task"

dataset:
  name: "halueval_qa"
  num_samples: 500
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "cuda:0"

methods:
  agsar:
    semantic_layers: 4
    enable_unified_gating: true
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_method: "top1_projection"
    aggregation_method: "mean"
    calibration_temperature: 1.0

evaluation:
  metrics:
    - auroc
    - auprc
    - tpr_at_5fpr
    - ece
    - brier
    - spearman
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/knowledge_conflict_qa"
  save_predictions: true
  save_scores: true
