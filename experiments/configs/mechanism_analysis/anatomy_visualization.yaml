# ==============================================================================
# SCIENTIFIC VISUALIZATION: ANATOMY OF A HALLUCINATION
# ==============================================================================
# Goal: Visualize the three AG-SAR signals during hallucination onset
#
# This experiment generates per-token component scores for visualization:
#   - Authority Score: Information provenance (drops when hallucinating)
#   - Agreement Gate: MLP-Attention consensus (diverges at hallucination)
#   - Semantic Dispersion: Top-k embedding consistency (spikes at hallucination)
#
# The visualization reveals:
#   - WHEN hallucination begins (onset detection)
#   - HOW the three signals interact during failure
#   - WHY certain tokens are flagged as uncertain
#
# Run with:
#   python -m experiments.main --config experiments/configs/mechanism_analysis/anatomy_visualization.yaml
#
# Visualize with:
#   python experiments/analysis/plot_hallucination_anatomy.py \
#     --dir results/anatomy_visualization
#
# Or use demo mode (no results file needed):
#   python experiments/analysis/plot_hallucination_anatomy.py --demo
# ==============================================================================

experiment:
  name: "anatomy_visualization"
  description: "Per-token AG-SAR signals for hallucination visualization"

dataset:
  name: "ragtruth"
  task_type: "QA"
  num_samples: 50  # Small set for detailed visualization
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention hooks
  dtype: "bfloat16"
  device_map: "cuda:0"

methods:
  agsar:
    # Standard configuration for visualization
    semantic_layers: 4
    enable_unified_gating: true
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_method: "top1_projection"
    aggregation_method: "mean"
    calibration_temperature: 1.0
    # Enable per-token output for visualization
    save_per_token_scores: true

evaluation:
  metrics:
    - auroc
    - auprc
  bootstrap_samples: 100  # Smaller for fast iteration

output:
  output_dir: "results/anatomy_visualization"
  save_predictions: true
  save_scores: true
  save_per_token: true  # Critical for visualization
