# ==============================================================================
# MECHANISM SWEEP: Llama-3.1-8B (Baseline)
# ==============================================================================
# Baseline model for comparison against 70B (scaling) and Mistral (architecture).
# ==============================================================================

experiment:
  name: "mechanism_sweep_8b"
  description: "Baseline: Llama-3.1-8B mechanism signature"

dataset:
  name: "halueval_qa"
  num_samples: 300
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"
  dtype: "bfloat16"
  device_map: "cuda:0"

methods:
  agsar:
    semantic_layers: 4
    enable_unified_gating: true
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_method: "top1_projection"
    aggregation_method: "mean"
    calibration_temperature: 1.0

evaluation:
  metrics:
    - auroc
    - auprc
    - spearman
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/mechanism_sweep/llama8b"
  save_predictions: true
  save_scores: true
