# ==============================================================================
# SCIENTIFIC EVALUATION: KNOWLEDGE CONFLICT DIAGNOSIS
# ==============================================================================
# Goal: Disentangle Parametric Stubbornness vs. Epistemic Confusion
#
# This experiment analyzes WHY hallucinations occur by examining the internal
# AG-SAR component scores:
#   - Gate < 0.5: Parametric Stubbornness (model rejected context, used memory)
#   - Gate > 0.5: Epistemic Confusion (model tried context but generation unstable)
#
# Run with:
#   python -m experiments.main --config experiments/configs/eval_knowledge_conflict.yaml
#
# Analyze with:
#   python experiments/analysis/evaluate_knowledge_conflict.py \
#     --file results/knowledge_conflict/<latest>.jsonl
# ==============================================================================

experiment:
  name: "knowledge_conflict_analysis"
  description: "Mechanism diagnosis: Parametric Stubbornness vs Epistemic Confusion"

dataset:
  name: "ragtruth"
  task_type: "QA"
  num_samples: 500  # Statistical significance requires >100 samples
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "eager"  # Required for attention hooks
  dtype: "bfloat16"
  device_map: "cuda:0"

methods:
  agsar:
    # v8.0 SOTA configuration
    semantic_layers: 4
    enable_unified_gating: true
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_method: "top1_projection"
    aggregation_method: "mean"
    calibration_temperature: 1.0

evaluation:
  metrics:
    - auroc
    - auprc
    - tpr_at_5fpr
    - ece
    - brier
    - spearman
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/knowledge_conflict"
  save_predictions: true
  save_scores: true
