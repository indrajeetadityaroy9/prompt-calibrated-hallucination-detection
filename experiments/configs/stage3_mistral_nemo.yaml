# Stage 3b: Mistral-Nemo Architecture Test
# Purpose: Test AG-SAR on Mistral-Nemo (different tokenizer: Tekken)

experiment:
  name: "stage3_mistral_nemo"
  description: "Test AG-SAR on Mistral-Nemo with Tekken tokenizer"

dataset:
  name: halueval_qa
  num_samples: 500
  seed: 42

model:
  name: "mistralai/Mistral-Nemo-Instruct-2407"
  dtype: "bfloat16"
  attn_implementation: "sdpa"
  device_map: "balanced"
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
  logprob: true   # CRITICAL: Required for architecture comparison
  entropy: true   # CRITICAL: Required for architecture comparison

evaluation:
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/stage3_mistral_nemo"
  save_predictions: true
  save_scores: true
