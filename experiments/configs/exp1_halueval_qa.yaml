# Experiment 1: HaluEval QA Benchmark
# Paper Section 4.1: Synthetic Hallucination Detection
#
# This is the primary benchmark comparing AG-SAR against all baselines
# on HaluEval question-answering with balanced hallucinated/factual pairs.

experiment:
  name: "exp1_halueval_qa"
  description: "Main benchmark on HaluEval QA with AG-SAR v3.1/v3.2 and baselines"

dataset:
  name: "halueval_qa"
  num_samples: 2500  # Results in ~5000 samples after pairing
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "sdpa"
  dtype: "bfloat16"
  device_map: "cuda:0"  # Single GPU optimization
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_register_filter: true
    enable_spectral_roughness: true
    kurtosis_threshold: 2.0
    lambda_roughness: 10.0
    ema_decay: 0.995
    sink_token_count: 4
  logprob: true
  entropy: true
  # NOTE: SelfCheck moved to exp4_baseline_comparison (saves ~17 hours)
  # selfcheck:
  #   num_samples: 5
  #   max_new_tokens: 100
  #   temperature: 1.0
  eigenscore: true

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/exp1_halueval_qa"
  save_predictions: true
  save_scores: true
