# MoE Robustness Test (Discussion)
# Purpose: Prove "AG-SAR is robust to dynamic compute paths (MoE Routing)"
# Paper Contribution: MoE architecture support demonstration

experiment:
  name: "04_moe_robustness"
  description: "Test AG-SAR on Mixtral-8x7B MoE architecture"

dataset:
  name: halueval_qa
  num_samples: 500
  seed: 42

model:
  name: "mistralai/Mixtral-8x7B-Instruct-v0.1"
  dtype: "bfloat16"
  attn_implementation: "sdpa"
  device_map: "balanced"  # Splits across 2x H100
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
  logprob: true   # CRITICAL: Required to prove MoE robustness vs baseline
  entropy: true   # CRITICAL: Required to prove MoE robustness vs baseline

evaluation:
  metrics:
    # Discrimination (higher=better)
    - auroc
    - auprc
    - auprc_factual
    # Classification (higher=better)
    - f1
    - precision
    - recall
    - accuracy
    # Calibration (lower=better)
    - ece
    - brier
    # Coverage & Utility (lower=better)
    - aurc
    - risk_80
    - risk_90
    - risk_95
    # Correlation (higher=better)
    - spearman
    - pearson
    - pointbiserial
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/04_moe_robustness"
  save_predictions: true
  save_scores: true

# MoE Divergence Hypothesis:
# If the router picks inconsistent experts for hallucinated facts,
# MLP divergence should SPIKE - this is a feature, not a bug.
# Compare divergence values between Mixtral (sparse) and Mistral-Nemo (dense).
