# Default Configuration for AG-SAR Experiments
# Standardized on Llama-3.1-8B-Instruct for controlled hallucination benchmarks
#
# Why Instruct? AG-SAR relies on the model following specific RAG/Summarization
# instructions. The base model is too erratic for controlled benchmarks.
#
# Why 8B first? Fits entirely on one H100 GPU (~16GB), leaving the other free
# for parallel experiments or 70B scaling tests.

model:
  # Llama 3.1 8B Instruct - primary benchmark model
  name: "meta-llama/Llama-3.1-8B-Instruct"
  device_map: "cuda:0"  # Explicit GPU 0 for 8B model
  dtype: "bfloat16"     # Native dtype for Llama 3.1 on H100
  # NOTE: AG-SAR requires "eager" attention for hook-based weight extraction
  # Flash Attention 2 doesn't expose attention weights, which breaks our hooks
  attn_implementation: "eager"
  trust_remote_code: true
  batch_size: 8

# AG-SAR defaults
methods:
  agsar:
    # Core mechanism
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    # Unified Gating
    enable_unified_gating: true
    gate_temperature: 1.0
    memory_weight: 0.5
    # Semantic Dispersion
    enable_semantic_dispersion: true
    dispersion_k: 5
    dispersion_sensitivity: 1.0
    dispersion_method: "top1_projection"  # Default for QA tasks
    # Aggregation
    aggregation_method: "mean"
    calibration_temperature: 1.0

# Alternative model configurations for scaling experiments
model_variants:
  llama_8b:
    name: "meta-llama/Llama-3.1-8B-Instruct"
    device_map: "cuda:0"
    dtype: "bfloat16"

  llama_70b:
    name: "meta-llama/Llama-3.1-70B-Instruct"
    device_map: "balanced"  # Spread across both H100s
    dtype: "bfloat16"
    batch_size: 4  # Reduce for memory

  llama_8b_base:
    name: "meta-llama/Llama-3.1-8B"
    device_map: "cuda:0"
    dtype: "bfloat16"

# Environment
environment:
  hf_token_env: "HF_TOKEN"  # Read from environment variable
  seed: 42
