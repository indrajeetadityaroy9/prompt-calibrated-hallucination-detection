# Stage 3: Architecture Sweep + Scaling Test (Qwen-32B)
# Purpose:
#   1. Verify AG-SAR generalizes across architectures
#   2. Provide SCALING DATA POINT: Llama-8B → Qwen-32B (4× parameters)
#
# PAPER CLAIM: "AG-SAR performance improves with model scale"
# Compare AUROC delta (AG-SAR - LogProb) between:
#   - Llama-3.1-8B (from exp1)
#   - Qwen2.5-32B (this config)
# A consistent or growing delta proves scale robustness.

experiment:
  name: "stage3_architecture_sweep"
  description: "Qwen-32B architecture test + 4× scaling comparison vs Llama-8B"

dataset:
  name: halueval_qa
  num_samples: 500
  seed: 42

# Note: This config runs multiple models sequentially
# Each model is run separately with the same dataset

model:
  name: "Qwen/Qwen2.5-32B-Instruct"  # Primary model for this config
  dtype: "bfloat16"
  attn_implementation: "sdpa"
  device_map: "balanced"
  trust_remote_code: true

methods:
  agsar:
    semantic_layers: 4
    enable_register_filter: true
    enable_spectral_roughness: true
  logprob: true
  entropy: true

evaluation:
  metrics:
    - auroc
    - auprc
    - ece
    - brier
    - aurc
  bootstrap_samples: 500
  confidence_level: 0.95

output:
  output_dir: "results/stage3_architecture"
  save_predictions: true
  save_scores: true

# Additional models to test (run separately):
# - mistralai/Mistral-Nemo-Instruct-2407
# - mistralai/Mixtral-8x7B-Instruct-v0.1 (MoE - batch_size: 4)
