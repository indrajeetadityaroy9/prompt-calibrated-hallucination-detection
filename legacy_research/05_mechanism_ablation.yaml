# Mechanism Ablation (Table 3)
# Paper Section 5: Ablation Analysis
#
# Tests the contribution of each AG-SAR component:
# 1. Full AG-SAR (Authority Flow + Unified Gating + Semantic Dispersion)
# 2. No Unified Gating (Authority Flow only)
# 3. No Semantic Dispersion (raw confidence)
# 4. No Register Filter
# 5. No MLP Divergence

experiment:
  name: "05_mechanism_ablation"
  description: "Ablation study of AG-SAR components"

dataset:
  name: "halueval_qa"
  num_samples: 1000
  seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "sdpa"
  dtype: "bfloat16"
  device_map: "cuda:0"  # Single GPU optimization
  trust_remote_code: true

# Default: Full AG-SAR
# To run ablations, modify and re-run:
# - No Register Filter: enable_register_filter: false
# - No MLP Divergence: enable_spectral_roughness: false
# - Different lambda: lambda_roughness: 0.0 / 5.0 / 20.0
methods:
  agsar:
    semantic_layers: 4
    power_iteration_steps: 3
    residual_weight: 0.5
    enable_register_filter: true
    enable_spectral_roughness: true
    kurtosis_threshold: 2.0
    lambda_roughness: 10.0
    ema_decay: 0.995
    sink_token_count: 4

evaluation:
  confidence_threshold: 0.7
  metrics:
    # Discrimination (higher=better)
    - auroc
    - auprc
    - auprc_factual
    # Classification (higher=better)
    - f1
    - precision
    - recall
    - accuracy
    # Calibration (lower=better)
    - ece
    - brier
    # Coverage & Utility (lower=better)
    - aurc
    - risk_80
    - risk_90
    - risk_95
    # Correlation (higher=better)
    - spearman
    - pearson
    - pointbiserial
  bootstrap_samples: 1000
  confidence_level: 0.95

output:
  output_dir: "results/05_mechanism_ablation"
  save_predictions: true
  save_scores: true
