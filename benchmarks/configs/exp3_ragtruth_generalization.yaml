# Experiment 3: Generalization to Natural Hallucinations
# Target: Prove AG-SAR generalizes from synthetic (HaluEval) to natural (RAGTruth)
# Key: Use EXACT SAME config as Experiment 1 - no hyperparameter tuning

experiment_name: "exp3_ragtruth_generalization"
dataset: "ragtruth"
num_samples: 1000  # Natural hallucinations (harder than synthetic)

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "sdpa"    # Same as Exp 1
  dtype: "bfloat16"
  batch_size: 8                  # Smaller batch due to longer prompts in RAG
  device_map: "cuda:0"           # Single GPU for 8B model

config:
  # EXACT SAME CONFIG AS EXPERIMENT 1 (HaluEval)
  # Proves generalization without hyperparameter tuning
  enable_register_filter: false
  enable_authority_flow: true
  recharge_weight: 1.0
  enable_spectral_roughness: false
  lambda_roughness: 0.0

  # Centrality computation (unchanged from Exp 1)
  semantic_layers: 4
  residual_weight: 0.5
  power_iteration_steps: 3

  # H100 Optimization
  use_tf32: true
  use_torch_compile: false

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - precision
    - recall

output:
  save_predictions: true
  save_scores: true
  output_dir: "results/exp3_ragtruth"
