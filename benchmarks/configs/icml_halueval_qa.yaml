# ICML-Grade Benchmark: HaluEval QA
# 2500 raw samples → ~5000 eval samples (balanced pairs)

experiment:
  name: "icml_halueval_qa"
  description: "ICML-grade benchmark on HaluEval QA with statistical rigor"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "sdpa"
  dtype: "bfloat16"

dataset: "halueval_qa"
num_samples: 2500  # → ~5000 eval samples after pairing

# AG-SAR configuration (v3.1/v3.2)
config:
  semantic_layers: 4
  power_iteration_steps: 3
  residual_weight: 0.5
  enable_register_filter: true
  enable_spectral_roughness: true
  kurtosis_threshold: 2.0
  lambda_roughness: 10.0

# SelfCheck configuration
selfcheck_samples: 5
selfcheck_max_tokens: 100
selfcheck_limit: 500  # Subset for SOTA comparison (expensive)

# Confidence filtering
confidence_threshold: 0.7

# Statistical analysis
statistics:
  bootstrap_samples: 1000
  confidence_level: 0.95
  seeds: [42, 123, 456]  # Multiple runs for variance estimation

# Output
output_dir: "results/icml/halueval_qa"
