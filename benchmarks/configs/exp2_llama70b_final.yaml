# Experiment 2: Scaling Law Validation
# Target: Verify AG-SAR AUROC holds (or improves) on 70B scale

experiment_name: "exp2_llama3_70b_scaling"
dataset: "halueval_qa"
num_samples: 500  # Reduced sample size (70B is slower)

model:
  name: "meta-llama/Llama-3.1-70B-Instruct"
  attn_implementation: "sdpa"    # Kept same as winning 8B run
  dtype: "bfloat16"

  # CRITICAL HARDWARE CHANGES FOR 70B
  device_map: "balanced"         # Splits 140GB model across 2x H100s
  batch_size: 4                  # REDUCED: 70B context consumes massive memory

config:
  # EXACT WINNING CONFIGURATION FROM EXP 1
  enable_register_filter: false
  enable_authority_flow: true
  recharge_weight: 1.0
  enable_spectral_roughness: false
  lambda_roughness: 0.0

  # Centrality computation
  semantic_layers: 4
  residual_weight: 0.5
  power_iteration_steps: 3

  # H100 Optimization
  use_tf32: true
  use_torch_compile: false  # Disabled to avoid dynamo issues

evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - precision
    - recall

output:
  save_predictions: true
  save_scores: true
  output_dir: "results/exp2_llama70b"
