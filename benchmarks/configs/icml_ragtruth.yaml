# ICML-Grade Benchmark: RAGTruth (Natural Hallucinations)
# Tests generalization to real-world hallucinations

experiment:
  name: "icml_ragtruth"
  description: "ICML-grade benchmark on RAGTruth natural hallucinations"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "sdpa"
  dtype: "bfloat16"

dataset: "ragtruth"
num_samples: 2000  # Full test set coverage

# AG-SAR configuration (v3.1/v3.2)
config:
  semantic_layers: 4
  power_iteration_steps: 3
  residual_weight: 0.5
  enable_register_filter: true
  enable_spectral_roughness: true
  kurtosis_threshold: 2.0
  lambda_roughness: 10.0

# SelfCheck configuration
selfcheck_samples: 5
selfcheck_max_tokens: 100
selfcheck_limit: 400  # Subset for SOTA comparison

# Confidence filtering
confidence_threshold: 0.7

# Statistical analysis
statistics:
  bootstrap_samples: 1000
  confidence_level: 0.95
  seeds: [42, 123, 456]

# Output
output_dir: "results/icml/ragtruth"
