# ICML-Grade Benchmark: HaluEval Summarization
# Tests on longer context summarization task

experiment:
  name: "icml_halueval_summarization"
  description: "ICML-grade benchmark on HaluEval Summarization"

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "sdpa"
  dtype: "bfloat16"

dataset: "halueval_summarization"
num_samples: 2000  # → ~4000 eval samples

# AG-SAR configuration (v3.1/v3.2)
config:
  semantic_layers: 4
  power_iteration_steps: 3
  residual_weight: 0.5
  enable_register_filter: true
  enable_spectral_roughness: true
  kurtosis_threshold: 2.0
  lambda_roughness: 10.0

# SelfCheck configuration
selfcheck_samples: 5
selfcheck_max_tokens: 150  # Longer for summarization
selfcheck_limit: 300  # Fewer due to longer contexts

# Confidence filtering
confidence_threshold: 0.7

# Statistical analysis
statistics:
  bootstrap_samples: 1000
  confidence_level: 0.95
  seeds: [42, 123, 456]

# Output
output_dir: "results/icml/halueval_summ"
