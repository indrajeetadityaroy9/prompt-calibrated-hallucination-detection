# Baseline Comparison Experiment (ICML-level)
# Compares AG-SAR against LogProb, Entropy, and SelfCheckGPT
# Uses 2x H100 80GB for robust comparison

experiment_name: "baseline_comparison_icml"
dataset: "halueval_qa"
num_samples: 500  # Full statistical power

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  attn_implementation: "sdpa"
  dtype: "bfloat16"
  device_map: "cuda:0"  # Primary GPU for AG-SAR/baselines

config:
  # AG-SAR settings (same as Exp 1 - UNCHANGED for fair comparison)
  enable_register_filter: false
  enable_authority_flow: true
  enable_spectral_roughness: false
  semantic_layers: 4
  residual_weight: 0.5
  power_iteration_steps: 3

# SelfCheck settings (SOTA comparison - needs statistical significance)
run_selfcheck: true
selfcheck_limit: 500  # Run on ALL samples for fair comparison
selfcheck_samples: 5  # 5 stochastic samples (paper standard)
selfcheck_max_tokens: 100  # Full response length

confidence_threshold: 0.7

output_dir: "results/baseline_comparison_icml"
