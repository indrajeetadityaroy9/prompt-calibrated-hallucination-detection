experiment_name: "exp1_confident_hallucination"
dataset: "halueval_summarization"  # High difficulty task
num_samples: 100  # Reduced for faster verification

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  batch_size: 1
  dtype: "bfloat16"
  device_map: "cuda:1"  # Use GPU 1 (GPU 0 is busy)

config:
  enable_register_filter: true
  enable_authority_flow: true     # v3.1
  enable_spectral_roughness: true
  roughness_type: "mlp"           # v3.2 (The new metric)
  roughness_lambda: 20.0
  semantic_layers: 4
  power_iteration_steps: 3
  residual_weight: 0.5

evaluation:
  confidence_threshold: 0.8  # Filter for confident predictions
  metrics:
    - auroc
    - auprc
    - f1
    - precision
    - recall

output:
  save_predictions: true
  save_scores: true
  output_dir: "results/exp1"
