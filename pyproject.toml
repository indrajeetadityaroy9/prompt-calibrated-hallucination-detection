[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ag-sar"
version = "0.4.0"
description = "Attention-Graph Shifting Attention to Relevance: Single-Pass Inference-Time Hallucination Detection"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "Indrajeet Aditya Roy", email = "roy.indrajeet009@gmail.com"}
]
keywords = ["llm", "uncertainty", "hallucination", "attention", "transformers", "authority-flow"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# THE CORE (Single-Pass Inference-Time, O(N) operations only)
dependencies = [
    "torch>=2.2.0",            # Required for FlashAttn and torch.compile
    "transformers>=4.40.0,<4.45.0",  # CRITICAL: >=4.45 breaks attention hooks
    "numpy>=1.20.0,<2.0",      # Array utilities (2.x breaks pandas/scipy)
    "accelerate>=0.26.0",      # Efficient model loading (device_map)
    # Triton is strictly Linux-only. On Mac/Windows, the custom kernel
    # will fallback to the pure PyTorch implementation.
    "triton>=2.1.0; sys_platform == 'linux'",
]

[project.optional-dependencies]
# H100 Acceleration (Linux only, requires CUDA 12+)
h100 = [
    "flash-attn>=2.5.0; sys_platform == 'linux'",  # Full H100 SDPA speed
]
# THE LAB (Evaluation, Plotting, Baselines)
eval = [
    "scikit-learn>=1.2",       # AUROC, Precision-Recall, calibration
    "scipy>=1.10,<1.14",       # Statistical significance tests (1.14+ breaks imports)
    "matplotlib>=3.7",         # Confidence-Discrepancy Plots
    "seaborn>=0.12",           # Heatmaps for Attention
    "pandas>=2.0",             # Result aggregation tables
    "datasets>=2.0",           # TruthfulQA, HaluEval loader
    "tqdm>=4.65",              # Progress bars
    "rouge-score>=0.1.2",      # Text generation metrics
    "bert-score>=0.3.13",      # Semantic similarity
    "evaluate>=0.4.0",         # HuggingFace evaluate
    "nltk>=3.8",               # Tokenization utilities
    "spacy>=3.5",              # NLP pipeline
    "sentence-transformers>=2.2",  # Embedding models (requires tf-keras)
    "tf-keras>=2.15",          # Keras 3 compatibility shim
    "pyyaml>=6.0",             # Config file parsing
    "pydantic>=2.0",           # Config validation for experiments/
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]
all = [
    "ag-sar[dev,eval,h100]",
]

[project.urls]
Homepage = "https://github.com/indrajeetadityaroy9/AG-SAR"
Repository = "https://github.com/indrajeetadityaroy9/AG-SAR"

[tool.setuptools.packages.find]
where = ["src"]
include = ["ag_sar*"]

# Legacy package location (backward compatibility)
[tool.setuptools.package-dir]
"" = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py39"
select = ["E", "F", "W", "I", "UP"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
