# Layer Drift Validation Benchmark
# Tests whether "Mind-Change Detection" improves hallucination detection
# or just penalizes normal thought refinement.
#
# The Risk: If drift_sensitivity is too high, we penalize ALL generations
# because models naturally refine answers between mid and final layers.
#
# Success Criteria:
#   - TPR (Recall) improves without AUPRC collapsing
#   - Faithful samples should NOT have high uncertainty
#
# Failure Criteria:
#   - Both Hallucinated AND Faithful samples get high uncertainty
#   - This means we're measuring "depth of processing" not "deception"
#
# Usage:
#   python scripts/launch_ragtruth_h2h.py --config experiments/configs/benchmark_layer_drift.yaml

experiment:
  name: "Validation_Layer_Drift"
  description: "JEPA Baseline vs JEPA + Layer Drift (sensitivity calibration)"

output:
  output_dir: "results/layer_drift"
  save_predictions: true
  save_scores: true

# Model configuration
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "bfloat16"
  attn_implementation: "eager"  # Required for AG-SAR hooks
  trust_remote_code: true
  batch_size: 1

# Dataset configuration (RAGTruth - hardest test)
dataset:
  name: "ragtruth"
  data_file: "data/ragtruth_clean.jsonl"
  task_type: "all"
  num_samples: null  # Full dataset
  seed: 42

# Evaluation configuration
evaluation:
  confidence_threshold: 0.7
  metrics:
    - auroc
    - auprc
    - f1
    - tpr_at_5fpr
    - aurc
  bootstrap_samples: 1000
  confidence_level: 0.95

# Method configurations for parallel execution
parallel_methods:
  # GPU 0: The Current Champion (Control/Reference)
  - name: "JEPA_Baseline"
    gpu_id: 0
    agsar:
      semantic_layers: 4
      power_iteration_steps: 3
      residual_weight: 0.5
      enable_unified_gating: true
      stability_sensitivity: 1.0
      enable_semantic_dispersion: true
      dispersion_k: 10
      dispersion_sensitivity: 0.8
      dispersion_method: "centroid_variance"
      aggregation_method: "percentile_25"
      parametric_weight: 0.6
      # Layer Drift DISABLED (Control)
      enable_layer_drift: false

  # GPU 1: Layer Drift (Aggressive - sensitivity=1.0)
  # Test: Does high sensitivity penalize everything or just hallucinations?
  - name: "JEPA_Drift_Sens1.0"
    gpu_id: 1
    agsar:
      semantic_layers: 4
      power_iteration_steps: 3
      residual_weight: 0.5
      enable_unified_gating: true
      stability_sensitivity: 1.0
      enable_semantic_dispersion: true
      dispersion_k: 10
      dispersion_sensitivity: 0.8
      dispersion_method: "centroid_variance"
      aggregation_method: "percentile_25"
      parametric_weight: 0.6
      # Layer Drift ENABLED (Aggressive)
      enable_layer_drift: true
      drift_layer_ratio: 0.5   # Layer 16/32 for Llama-3.1-8B
      drift_sensitivity: 1.0   # Aggressive penalty
